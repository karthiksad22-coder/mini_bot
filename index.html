<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galactic AI Chat</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top,#0b0f2a,#02010a 80%);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    height:650px;
    background:rgba(20,20,40,0.85);
    backdrop-filter: blur(10px);
    border-radius:20px;
    box-shadow:0 0 40px rgba(120,80,255,0.6);
    display:flex;
    flex-direction:column;
}

.header{
    text-align:center;
    padding:18px;
    font-size:22px;
    background:linear-gradient(90deg,#6f5cff,#9c3bff);
    border-radius:20px 20px 0 0;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    margin:10px 0;
    padding:10px 14px;
    border-radius:14px;
    max-width:75%;
}

.user{
    background:#6f5cff;
    margin-left:auto;
}

.bot{
    background:#333;
}

.input-area{
    display:flex;
    padding:12px;
    border-top:1px solid rgba(255,255,255,0.1);
}

input{
    flex:1;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    background:#111;
    color:white;
}

button{
    margin-left:10px;
    padding:10px 16px;
    border:none;
    border-radius:12px;
    background:#7a5cff;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#9a7dff;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">🌌 Galactic AI</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

const chatBox = document.getElementById("chat")

function addMessage(text,type){
    const div=document.createElement("div")
    div.className="message "+type
    div.innerText=text
    chatBox.appendChild(div)
    chatBox.scrollTop=chatBox.scrollHeight
}

async function sendMessage(){

    const input=document.getElementById("input")
    const message=input.value.trim()

    if(!message) return

    addMessage(message,"user")
    input.value=""

    try{

        const response=await fetch("http://localhost:5000/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:message
            })
        })

        const data=await response.json()

        addMessage(data.reply,"bot")

    }catch(error){

        addMessage("⚠️ Cannot connect to server","bot")

    }

}

document.getElementById("input").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        sendMessage()
    }

})

</script>

</body>
</html>
